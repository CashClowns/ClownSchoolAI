    { question: "A help desk group should manage devices and policies only within the 'Branch-A' location, not the whole tenant. What combination enforces this?", options: { A: "Assign an Intune RBAC role scoped with a scope tag / scope group for Branch-A", B: "Grant Global Administrator", C: "Add them to the Device Administrators role", D: "Create a compliance policy for Branch-A" }, correct: "A", explanation: "Intune RBAC roles combined with scope tags/scope groups limit what objects an admin can see and manage — the way to enforce per-location least privilege." },
    { question: "You want all Windows devices marked 'corporate' and running an OS build below 22H2 to be grouped automatically for remediation. What do you create?", options: { A: "A dynamic device group with a membership rule on device attributes", B: "A static security group", C: "A configuration profile", D: "An enrollment restriction" }, correct: "A", explanation: "Dynamic device groups use membership rules (e.g., deviceOSVersion, deviceOwnership) to auto-include matching devices. Static groups require manual membership." },
    { question: "Access to Microsoft 365 must be blocked from any device not marked compliant in Intune. Two things are required. (Choose two.)", options: { A: "A compliance policy that evaluates the device", B: "A Conditional Access policy with the 'require compliant device' grant", C: "A device configuration profile", D: "Security defaults enabled" }, correct: ["A", "B"], explanation: "The compliance policy determines the device's compliance state; a Conditional Access policy with the require-compliant-device grant enforces it at sign-in. Both are needed; security defaults can't do this granularly." },
    { question: "Windows Hello for Business should let users sign in with a PIN or biometric backed by an asymmetric key pair instead of a password. Where do you enable it for all enrolled devices?", options: { A: "An account protection policy (or device enrollment WHfB settings) in Intune", B: "A compliance policy", C: "Conditional Access", D: "BitLocker policy" }, correct: "A", explanation: "Windows Hello for Business is configured tenant-wide in enrollment or via an account protection policy, provisioning a device-bound credential. Compliance and CA evaluate/enforce, they don't deploy WHfB." },
    { question: "You must ensure every Windows device's built-in local Administrator password is unique, rotated automatically, and recoverable by IT. Which solution?", options: { A: "Windows LAPS managed by Intune", B: "Endpoint Privilege Management", C: "A configuration profile setting a shared password", D: "Conditional Access" }, correct: "A", explanation: "Windows LAPS backs up and rotates a unique local admin password (to Entra ID or AD) and lets authorized admins retrieve it. EPM elevates tasks; it doesn't manage the local admin password." },
    { question: "A compliance policy should give noncompliant devices a 24-hour grace period before being marked noncompliant and emailing the user. Where is this defined?", options: { A: "The 'Actions for noncompliance' in the compliance policy", B: "A Conditional Access session control", C: "Enrollment restrictions", D: "The update ring deadline" }, correct: "A", explanation: "Compliance policies define Actions for noncompliance — a timed sequence (notify, grace period, mark noncompliant, lock/retire). Conditional Access has no grace-period setting." },

    { question: "A company issues Android phones to employees for work-only use. IT must manage the entire device with no personal profile. Which Android Enterprise enrollment mode?", options: { A: "Fully managed (COBO — Corporate Owned, Business Only)", B: "Dedicated device (COSU)", C: "Corporate-owned with work profile (COPE)", D: "Personal work profile" }, correct: "A", explanation: "Fully managed enrolls a company-owned Android device for a single user with IT controlling the whole device and no personal profile. Dedicated is for shared kiosk devices; COPE allows a personal profile alongside work; personal work profile is for BYOD." },
    { question: "A hospital deploys 80 Android tablets shared by rotating staff as a single locked-down medication app. No user accounts, no personal use. Which Android Enterprise enrollment mode?", options: { A: "Dedicated device (COSU)", B: "Fully managed", C: "Corporate-owned with work profile", D: "Personal work profile" }, correct: "A", explanation: "Dedicated device (Corporate Owned, Single Use) is purpose-built for shared, kiosk, or single-app devices with no user identity required. Fully managed is for assigned single-user devices." },
    { question: "Field workers get company-owned Android phones but also need a personal profile for their own apps. IT fully manages the work side. Which Android enrollment mode?", options: { A: "Corporate-owned with work profile (COPE)", B: "Fully managed", C: "Dedicated device", D: "Personal work profile" }, correct: "A", explanation: "COPE gives IT full control of the device while allowing a separate personal profile the user manages. Fully managed has no personal profile; dedicated is for kiosks; personal work profile is for BYOD personal-owned phones." },
    { question: "Employees want corporate email and apps on their personal Android phones without IT seeing personal data or managing the device. Which Android enrollment?", options: { A: "Personal work profile (BYOD)", B: "Fully managed", C: "COPE", D: "Dedicated device" }, correct: "A", explanation: "Personal work profile creates a managed container on a personally-owned device. IT manages only the work profile apps and data, with no visibility into personal apps. COPE and fully managed are for company-owned devices." },
    { question: "Employees have personal iPhones and need access to corporate email. IT must protect corporate data at the app layer without managing the whole device or seeing personal content. Which iOS enrollment type?", options: { A: "User enrollment", B: "Automated Device Enrollment (ADE) via Apple Business Manager", C: "Device enrollment", D: "Apple Configurator enrollment" }, correct: "A", explanation: "iOS User enrollment creates a managed APFS volume for work data, keeping personal data completely separate and invisible to IT. ADE (supervised) is for company-owned devices. Device enrollment is for personal or company-owned without ABM supervision." },
    { question: "A named contractor must be added to the local Administrators group on all Windows endpoints via Intune policy, without making all help desk staff local admins. Where is this configured?", options: { A: "Endpoint Security > Account protection > Local user group membership", B: "A device compliance policy", C: "A Win32 app with a PowerShell install script", D: "A custom OMA-URI profile" }, correct: "A", explanation: "Account protection > Local user group membership policies in Endpoint Security let you Add, Remove, or Replace members of local Windows groups (Administrators, Users, etc.) — the modern cloud replacement for Restricted Groups GPO." },
    { question: "IT must block personally-owned Android devices from enrolling in Intune while allowing company-owned Android enrollment. What enforces this distinction before enrollment?", options: { A: "Enrollment restrictions (device platform restrictions — block personal ownership)", B: "A compliance policy targeting Android personal devices", C: "A Conditional Access policy requiring a compliant device", D: "An app protection policy" }, correct: "A", explanation: "Enrollment restrictions filter device platform, OS version, and ownership type. Blocking 'personally owned' Android enrollment prevents BYOD enrollment while permitting corporate-owned Android — evaluated before enrollment begins." },
    { question: "IT needs to enroll 400 Windows kiosk devices in Intune without user sign-in, without Autopilot registration, using a USB drive. Which method creates the enrollment package?", options: { A: "A bulk enrollment token embedded in a provisioning package via Windows Configuration Designer", B: "Windows Autopilot self-deploying mode", C: "Automated Device Enrollment via Apple Business Manager", D: "MDM auto-enrollment triggered by Entra ID join" }, correct: "A", explanation: "Bulk enrollment generates a token in Intune that you embed in a PPKG using Windows Configuration Designer. Applied via USB or network, it joins devices to Entra ID and enrolls in Intune without user credentials. Autopilot self-deploying still requires TPM 2.0 and cloud registration." },
    { question: "Autopilot devices must be automatically added to a device group the moment they register, before enrollment completes, so they receive the correct Autopilot profile. What group rule targets Autopilot-registered devices?", options: { A: "A dynamic device group with rule: (device.devicePhysicalIds -any _ -contains '[ZTDId]')", B: "A static group populated by a script post-enrollment", C: "A dynamic group on deviceEnrollmentType eq 'windowsAutoEnrollment'", D: "A compliance policy that assigns group membership on match" }, correct: "A", explanation: "ZTDId (Zero Touch Deployment ID) is stamped on devices when registered in Autopilot. A dynamic group filtering [ZTDId] captures Autopilot devices before enrollment — the standard pre-assignment pattern for Autopilot profiles." },
    { question: "Your hybrid Entra joined environment needs Windows Hello for Business so users can sign in with a PIN without line-of-sight to a domain controller after initial setup. Which WHfB trust type achieves this?", options: { A: "Cloud Kerberos trust", B: "Key trust", C: "Certificate trust", D: "Password hash sync trust" }, correct: "A", explanation: "Cloud Kerberos trust uses an Entra Kerberos server object to issue partial TGTs, enabling WHfB sign-in in hybrid environments without requiring DC line-of-sight after provisioning. Key trust requires DC connectivity at every sign-in; certificate trust needs a PKI infrastructure." },
    { question: "A global company has APAC and EMEA IT teams. Each team should only see and manage Intune objects (devices, policies, apps) for their own region. What implements this least-privilege separation?", options: { A: "Scope tags assigned to regional devices, policies, and apps — combined with region-specific RBAC roles for each admin team", B: "Separate Intune tenants per region", C: "Conditional Access policies filtering by country/region", D: "Separate compliance policies per region that restrict admin visibility" }, correct: "A", explanation: "Scope tags + RBAC roles restrict what objects each admin sees in Intune. Tag objects with 'APAC' or 'EMEA' and assign those tags to the corresponding role assignments — no separate tenant needed." },
    { question: "Which two configurations are required before a Conditional Access policy can enforce 'Require compliant device' for Windows endpoints? (Choose two.)", options: { A: "A device compliance policy targeting Windows devices", B: "MDM automatic enrollment configured in Entra ID (MDM user scope set)", C: "A Windows Defender Antivirus endpoint security policy", D: "A Windows Hello for Business policy" }, correct: ["A","B"], explanation: "A compliance policy must exist so devices can be evaluated and marked compliant. MDM auto-enrollment ensures devices are Intune-managed so compliance can run. Without both, devices are never flagged as compliant and CA blocks everyone." },
    { question: "Compliance policies need to target only macOS devices running a version below Ventura 13.0. Assignment filters help here. Which filter property narrows the assignment to the correct macOS OS version?", options: { A: "device.osVersion -startsWith '12' (Monterey)", B: "device.model -eq 'MacBook Pro'", C: "device.manufacturer -eq 'Apple'", D: "device.deviceCategory -eq 'macOS'" }, correct: "A", explanation: "Assignment filters support device.osVersion to target specific OS versions. Filtering on osVersion starting with '12' targets macOS Monterey devices precisely without creating extra groups. Model and manufacturer catch all Apple devices, not just the right OS version." },
  ],
  maintain: [
    { question: "New Windows laptops must auto-join Entra ID and enroll in Intune, with the assigned user signing in to complete setup. No IT imaging. Which approach?", options: { A: "Windows Autopilot, user-driven mode", B: "A provisioning package (PPKG)", C: "Autopilot self-deploying mode", D: "Subscription Activation" }, correct: "A", explanation: "User-driven Autopilot has the assigned user drive OOBE while Entra join and Intune enrollment happen automatically. Provisioning packages are for offline/quick bulk config; self-deploying is userless." },
    { question: "You need to set up shared kiosk devices with no user credentials during provisioning, relying on TPM attestation. Which Autopilot mode?", options: { A: "Self-deploying mode", B: "User-driven mode", C: "Pre-provisioning (white glove)", D: "Hybrid join" }, correct: "A", explanation: "Self-deploying mode provisions with no user identity and requires TPM 2.0 — built for kiosks, digital signage, and shared devices." },
    { question: "During Autopilot you must show users a progress screen that blocks desktop access until required apps and policies finish installing. What do you configure?", options: { A: "An Enrollment Status Page (ESP)", B: "A device name template", C: "A compliance policy", D: "Delivery Optimization" }, correct: "A", explanation: "The Enrollment Status Page tracks and can block until device/user setup (apps, policies, certs) completes during Autopilot. It doesn't name devices or check compliance." },
    { question: "Autopilot devices should be named like 'FORM-' followed by the serial number. Where do you set this?", options: { A: "A device name template in the Autopilot deployment profile", B: "A configuration profile", C: "The ESP", D: "A compliance policy" }, correct: "A", explanation: "The Autopilot deployment profile includes a device name template supporting variables such as %SERIAL% and %RAND%. Configuration profiles don't set the Autopilot name." },
    { question: "A small remote office with no Autopilot registration needs technicians to quickly configure a handful of new PCs offline (Wi‑Fi, join, apps) from a USB stick. Best tool?", options: { A: "A provisioning package created with Windows Configuration Designer", B: "Windows Autopilot user-driven", C: "A Win32 app", D: "A security baseline" }, correct: "A", explanation: "Provisioning packages (PPKG) from Windows Configuration Designer apply config offline via USB — ideal when Autopilot registration isn't in place. Autopilot needs cloud registration." },
    { question: "Finance needs virtual Windows desktops that users reach from any device, with per-user fixed assignment and Microsoft-managed hosting. Which solution?", options: { A: "Windows 365 Cloud PC", B: "An Autopilot self-deploying profile", C: "A provisioning package", D: "Azure AD B2B" }, correct: "A", explanation: "Windows 365 Cloud PC provides per-user, always-on cloud PCs managed through Intune. Autopilot/PPKG provision physical devices, not cloud desktops." },
    { question: "You want to configure individual modern Windows settings backed by CSPs, choosing each setting from a searchable list. Which profile type?", options: { A: "Settings catalog", B: "Templates (Administrative Templates)", C: "Custom OMA-URI", D: "Imported GPO" }, correct: "A", explanation: "The settings catalog is the recommended modern profile exposing thousands of individual CSP-backed settings. Templates are curated groupings; OMA-URI is a manual fallback." },
    { question: "Your team has legacy Group Policy ADMX settings (e.g., for a third-party app) they want to deliver through Intune. What do you do?", options: { A: "Import the ADMX files and create an Imported Administrative Templates profile", B: "Recreate them as a compliance policy", C: "Use Delivery Optimization", D: "Deploy them as a Win32 app" }, correct: "A", explanation: "Intune supports importing custom ADMX/ADML files, then configuring those settings in a profile — the supported path for third-party ADMX-based policy." },
    { question: "A configuration profile should apply only to devices whose model is 'Surface Pro 9', regardless of which group they're in. What targets this most efficiently?", options: { A: "An assignment filter on a device property", B: "A separate dynamic group per model", C: "A scope tag", D: "A compliance policy" }, correct: "A", explanation: "Assignment filters include/exclude devices at assignment time by properties such as model or OS version — more flexible than maintaining per-model groups." },
    { question: "Standard users need to run a specific approved installer that requires admin rights, without being made local administrators. Which Intune Suite capability?", options: { A: "Endpoint Privilege Management (EPM)", B: "Remote Help", C: "Advanced Analytics", D: "Cloud PKI" }, correct: "A", explanation: "EPM defines elevation rules so approved apps/tasks run elevated for standard users — removing standing admin rights. The others address support, analytics, and certificates." },
    { question: "Help desk staff need to start secure, authenticated remote-control sessions with enrolled devices from inside Intune, with the user's consent. Which add-on?", options: { A: "Remote Help", B: "Endpoint Privilege Management", C: "Microsoft Tunnel", D: "Enterprise App Catalog" }, correct: "A", explanation: "Remote Help (Intune Suite) provides authenticated, RBAC-controlled remote assistance integrated with Intune. Tunnel is a VPN gateway; Enterprise App Catalog is for prepackaged apps." },
    { question: "An admin must find all Windows devices with less than 10 GB free disk space right now, in real time, across the fleet. Which capability?", options: { A: "Run a device query using KQL", B: "Open a compliance report", C: "Use Delivery Optimization", D: "Create a dynamic group" }, correct: "A", explanation: "Device query lets you run a live KQL query against a device's (or fleet's) current inventory for ad-hoc, real-time questions. Compliance reports are policy-based, not arbitrary live queries." },
    { question: "A lost laptop must be returned to factory state remotely so no company or user data remains. Which remote action?", options: { A: "Wipe", B: "Retire", C: "Sync", D: "Fresh Start" }, correct: "A", explanation: "Wipe performs a full factory reset, removing all data — correct for a lost/decommissioned device. Retire removes only company data; Sync forces a check-in." },

    { question: "You need to push a custom DNS suffix configuration to company-owned macOS devices via Intune. Which profile type do you use?", options: { A: "A macOS device configuration profile (Settings catalog or VPN template)", B: "A macOS compliance policy", C: "A macOS shell script deployed via Intune", D: "A custom OMA-URI profile" }, correct: "A", explanation: "macOS device configuration profiles (Devices > macOS > Configuration profiles) include template types (VPN, Wi-Fi, SCEP, etc.) and the Settings catalog for granular CSP-backed settings. OMA-URI is for Windows MDM CSPs. Shell scripts configure settings at script runtime but aren't managed policy objects." },
    { question: "Corporate iPhones must automatically connect to a per-app VPN for all managed app traffic without user intervention. Where is this configured in Intune?", options: { A: "An iOS/iPadOS device configuration profile with the VPN payload and per-app VPN associations", B: "An iOS compliance policy with a VPN requirement", C: "An app protection policy with a 'require managed network' setting", D: "A Conditional Access policy requiring a compliant network location" }, correct: "A", explanation: "Per-app VPN on iOS is configured via the VPN payload in an iOS device configuration profile, with specific managed apps mapped to the VPN connection. This auto-connects the VPN for those apps without user action. Compliance policies evaluate, not configure." },
    { question: "Your organization uses Azure Virtual Desktop with Windows 11 Enterprise multi-session. You need an Intune configuration profile targeting these VMs. What platform do you select?", options: { A: "Windows 10 and later — filtered or targeted to the multi-session SKU", B: "Windows Server", C: "macOS", D: "Windows 11 Enterprise only" }, correct: "A", explanation: "Intune manages Windows 11 Enterprise multi-session VMs under the 'Windows 10 and later' platform. Use assignment filters (device.operatingSystemSKU -eq 175) or the dedicated multi-session platform option in the Settings catalog to target these AVD hosts specifically." },
    { question: "Windows 11 Home devices need to automatically upgrade to Windows 11 Enterprise when users sign in with Microsoft 365 E3 licenses — no reimaging, no product key entry. Which feature handles this?", options: { A: "Subscription Activation (Windows 11 Enterprise via Microsoft 365 E3/E5)", B: "Windows Autopilot Reset", C: "A Windows Upgrade configuration profile in Intune", D: "A provisioning package with an enterprise edition key" }, correct: "A", explanation: "Subscription Activation automatically upgrades the Windows edition via license entitlement when a licensed user signs in. No reimage, no manual key — the upgrade happens transparently. A separate Windows feature update policy handles the version upgrade (e.g., Windows 10 → 11), but the edition upgrade is Subscription Activation." },
    { question: "Finance needs persistent, assigned virtual Windows desktops that are always on, user-specific, and where Microsoft manages all host infrastructure. Which solution?", options: { A: "Windows 365 Cloud PC", B: "Azure Virtual Desktop with Intune-managed session hosts", C: "Windows Autopilot for pre-provisioned deployment", D: "Hyper-V hosted on Azure VMs" }, correct: "A", explanation: "Windows 365 provides fixed, persistent, per-user Cloud PCs with Microsoft managing all backend infrastructure. AVD requires you to deploy and manage host pools and session hosts. Windows 365 is the right answer when 'Microsoft manages the infrastructure' is the requirement." },
    { question: "You need to issue SCEP certificates to all enrolled Intune devices for Wi-Fi authentication, without deploying on-premises NDES servers, CA infrastructure, or the Intune Certificate Connector. Which Intune Suite feature provides this?", options: { A: "Microsoft Cloud PKI", B: "Microsoft Tunnel", C: "Endpoint Privilege Management", D: "Microsoft Intune Advanced Analytics" }, correct: "A", explanation: "Microsoft Cloud PKI is a fully managed cloud CA in Intune Suite. It issues SCEP and PKCS certificates to enrolled devices, eliminating the need for NDES, on-premises CA, and the certificate connector. The entire certificate lifecycle is managed in the cloud." },
    { question: "iOS and Android MAM-enrolled (unenrolled) devices need access to internal company resources over a secure VPN tunnel. Which Intune feature supports VPN for unenrolled devices?", options: { A: "Microsoft Tunnel for Mobile Application Management (MAM)", B: "Always-On VPN device configuration profile", C: "An app protection policy with a network access requirement", D: "A Conditional Access policy with a managed network condition" }, correct: "A", explanation: "Microsoft Tunnel for MAM extends the Tunnel VPN gateway to unenrolled iOS and Android devices using app protection policies, enabling per-app VPN to internal resources without full device enrollment. Always-on VPN requires MDM enrollment." },
    { question: "An admin wants to deploy a pre-packaged, Microsoft-maintained enterprise Win32 app to endpoints without creating an .intunewin file or running the Content Prep Tool. Which Intune Suite feature?", options: { A: "Enterprise App Catalog", B: "Microsoft Store app (new)", C: "Win32 app with a manual .intunewin", D: "Managed Google Play" }, correct: "A", explanation: "Enterprise App Catalog (Intune Suite) provides a library of pre-packaged, maintained Win32 applications. No Content Prep Tool needed — Microsoft packages and maintains them. Microsoft Store app (new) is for WinGet-based Store apps, not traditional Win32 packages." },
    { question: "IT wants AI-generated insights into device health trends, battery degradation anomalies, and proactive risk detection across the Windows fleet before issues become incidents. Which Intune Suite feature?", options: { A: "Microsoft Intune Advanced Analytics", B: "Basic Endpoint Analytics (included in Intune)", C: "Real-time device query with KQL", D: "Microsoft Sentinel integration" }, correct: "A", explanation: "Advanced Analytics (Intune Suite) adds AI-driven anomaly detection, battery health reporting, enhanced device timeline, and predictive insights on top of basic Endpoint Analytics. KQL device query is ad-hoc and real-time; Advanced Analytics is continuous trend-based intelligence." },
    { question: "A user may have shared their BitLocker recovery key. IT must remotely generate a new recovery key and back it up to Entra ID without disrupting the user or requiring a reboot. Which Intune remote action?", options: { A: "Rotate BitLocker recovery keys (from Devices > [device] > Rotate BitLocker keys)", B: "Wipe the device and re-enroll", C: "Run a PowerShell remediation script", D: "Fresh Start" }, correct: "A", explanation: "Rotate BitLocker recovery keys is a dedicated Intune remote action that silently generates a new recovery key and uploads it to Entra ID — no user disruption, no reboot required. Wipe is destructive; Fresh Start reinstalls Windows. This is the correct response to a potentially compromised key." },
    { question: "A zero-day threat was announced. IT must immediately push the latest Defender antivirus definition update to all Windows devices without waiting for the next scheduled sync. Which Intune remote action?", options: { A: "Update Microsoft Defender Antivirus security intelligence", B: "Sync device", C: "Restart device", D: "Run a remediation script using MpCmdRun.exe" }, correct: "A", explanation: "'Update Microsoft Defender Antivirus security intelligence' is a specific Intune remote action that forces an immediate AV definition update. Sync triggers a policy check-in but not specifically an AV update. MpCmdRun is a workaround, not an official managed action." },
    { question: "200 Windows laptops from a disbanded department must all be factory-reset immediately. What is the fastest method in Intune?", options: { A: "Multi-select all 200 devices in Intune > Devices > All devices, then Bulk device actions > Wipe", B: "Delete the devices from Entra ID — this auto-wipes them", C: "Run a PowerShell script that calls Reset-ComputerMachinePassword on each", D: "Use Configuration Manager to deploy a wipe task sequence" }, correct: "A", explanation: "Bulk device actions in Intune allow selecting multiple devices and applying Wipe, Retire, Sync, Restart, or other actions simultaneously. Deleting from Entra ID does not trigger a device wipe. Bulk action is the correct efficient approach for fleet-wide remote wipe." },
    { question: "You need to target a configuration profile only to Samsung Android devices running OS version 12 or higher, without creating a manufacturer-specific device group. What is the most efficient approach?", options: { A: "An assignment filter with rules: (device.manufacturer -eq 'Samsung') and (device.osVersion -ge '12.0')", B: "A dynamic group with a custom extension attribute for Samsung", C: "Separate compliance policies per manufacturer", D: "A scope tag named 'Samsung-Android12'" }, correct: "A", explanation: "Assignment filters evaluate device properties at assignment time and support AND/OR logic across multiple properties including manufacturer, model, and OS version. This is more precise and flexible than maintaining manufacturer-specific dynamic groups." },
    { question: "Which two things CAN a Windows provisioning package (PPKG) created with Windows Configuration Designer do? (Choose two.)", options: { A: "Join a device to Microsoft Entra ID", B: "Deploy a Win32 .intunewin application", C: "Configure Wi-Fi network credentials and connect automatically", D: "Configure BitLocker encryption settings" }, correct: ["A","C"], explanation: "Provisioning packages can join Entra ID, install Store/universal apps, configure Wi-Fi, add certificates, set account details, and apply some policies. They CANNOT deploy Win32 .intunewin apps (Intune-managed) or configure BitLocker (requires Intune/GPO policy)." },
    { question: "You need to query all Windows devices in Intune right now to find which have less than 15 GB of free disk space on their C: drive. Which KQL table do you query?", options: { A: "LogicalDisk (filtering on FreeSpace and DeviceId = 'C:')", B: "InstalledApps", C: "DeviceInfo", D: "WindowsEvents" }, correct: "A", explanation: "The LogicalDisk table in Intune device query (KQL) contains disk information including FreeSpace, DriveType, and DeviceId. Filter on DeviceId = 'C:' and FreeSpace to find low-storage devices in real time." },
    { question: "A macOS configuration profile in Intune should prevent users from changing the system wallpaper and restrict access to System Settings. Which profile template type covers macOS device restrictions?", options: { A: "Device restrictions (macOS) template under Devices > macOS > Configuration profiles", B: "A macOS shell script", C: "A compliance policy for macOS", D: "A custom OMA-URI profile" }, correct: "A", explanation: "The Device restrictions template for macOS exposes settings like wallpaper lock, System Settings access, AirDrop, and other behavioral restrictions. Shell scripts run imperatively but aren't policy objects. OMA-URI is Windows-specific." },
    { question: "Windows devices need to receive Android configuration profiles for corporate Wi-Fi settings as part of managing an Android Enterprise fleet. Which Intune profile type targets Android Enterprise fully managed devices for Wi-Fi configuration?", options: { A: "A device configuration profile for Android Enterprise (Fully managed, dedicated, and corporate-owned work profile) with a Wi-Fi payload", B: "A compliance policy for Android with a Wi-Fi requirement", C: "A managed Google Play app configuration policy", D: "An Intune app protection policy for Android" }, correct: "A", explanation: "Android Enterprise device configuration profiles (Devices > Android > Configuration profiles) include Wi-Fi, VPN, email, certificates, and restrictions for fully managed, dedicated, and COPE devices. The enrollment type selected determines which Android Enterprise management mode the profile targets." },
  ],
  apps: [
    { question: "You must deploy a custom desktop application's .exe installer through Intune to managed Windows PCs. How do you prepare it?", options: { A: "Package it as a .intunewin file with the Microsoft Win32 Content Prep Tool", B: "Upload the raw .exe as a line-of-business app", C: "Convert it to .appx", D: "Add it as a configuration profile" }, correct: "A", explanation: "Win32 apps are wrapped into .intunewin with the Content Prep Tool, then uploaded with install/uninstall commands and detection rules. Raw .exe isn't a supported upload type." },
    { question: "A required app must install automatically on all targeted devices with no user interaction. Which assignment type?", options: { A: "Required", B: "Available for enrolled devices", C: "Uninstall", D: "Available with or without enrollment" }, correct: "A", explanation: "Required assignments push the install automatically. Available publishes the app as optional in Company Portal; Uninstall removes it." },
    { question: "You deploy Microsoft 365 Apps via Intune and want a predictable monthly feature-update cadence with security updates. Which update channel?", options: { A: "Monthly Enterprise Channel", B: "Current Channel (Preview)", C: "Beta Channel", D: "Semi-Annual Enterprise Channel" }, correct: "A", explanation: "Monthly Enterprise Channel ships feature updates once a month on a predictable schedule. Current updates more often; Semi-Annual is twice a year; Beta is pre-release." },
    { question: "An admin must centrally configure Office application settings (e.g., macro and default-file behavior) for users regardless of device. Which tool?", options: { A: "Office cloud policies via the Microsoft 365 Apps admin center (Cloud Policy)", B: "A Win32 app", C: "A compliance policy", D: "Delivery Optimization" }, correct: "A", explanation: "The Microsoft 365 Apps admin center's Cloud Policy service applies Office app policies to users, enforced when they sign in to Office on any device. Compliance/Win32 don't configure Office policy." },
    { question: "During an Autopilot deployment you need to install Microsoft 365 Apps with a specific configuration (channel, language, apps included). Which tooling produces the configuration XML?", options: { A: "The Office Deployment Tool (ODT) or Office Customization Tool (OCT)", B: "The Win32 Content Prep Tool", C: "Windows Configuration Designer", D: "KQL device query" }, correct: "A", explanation: "ODT/OCT generate the configuration.xml that defines channel, languages, and apps for Microsoft 365 Apps deployment (including within Autopilot). The Content Prep Tool packages Win32 apps." },
    { question: "Personal phones must keep corporate Outlook/Teams data encrypted with copy-paste and save-as restrictions, without enrolling the device. What do you deploy?", options: { A: "An app protection policy (MAM)", B: "A device compliance policy", C: "A device configuration profile", D: "A security baseline" }, correct: "A", explanation: "App protection policies (MAM) enforce data controls at the app level on unmanaged/BYO devices, with selective wipe — no full enrollment required." },
    { question: "You must require that users can only access Exchange Online from mobile apps that have an app protection policy applied. What enforces this?", options: { A: "A Conditional Access policy requiring an approved client app / app protection policy", B: "A compliance policy", C: "An app configuration policy", D: "An enrollment restriction" }, correct: "A", explanation: "Conditional Access can require app protection policy (or approved client apps) as a grant control, tying MAM protection to access. Compliance/config policies don't gate access." },
    { question: "You need to push per-app settings (like a preconfigured server URL) into a managed line-of-business mobile app at deployment. Which policy type?", options: { A: "An app configuration policy", B: "An app protection policy", C: "A compliance policy", D: "A configuration profile (settings catalog)" }, correct: "A", explanation: "App configuration policies deliver app-specific settings/keys to managed apps (managed devices or managed apps). App protection policies control data handling, not app settings." },
    { question: "Which two are valid ways to deploy store applications to managed Windows devices with Intune? (Choose two.)", options: { A: "Add a Microsoft Store app (new) in Intune and assign it", B: "Use the Enterprise App Catalog for prepackaged apps", C: "Email users the installer", D: "Create a compliance policy" }, correct: ["A", "B"], explanation: "Intune integrates the Microsoft Store (new) for store apps, and the Enterprise App Catalog (Intune Suite) provides prepackaged, ready-to-deploy apps. Emailing installers and compliance policies don't deploy apps." },

    { question: "You need to pre-configure the Outlook app's corporate email account for iOS devices enrolled via MAM (no full MDM enrollment). Which policy type applies settings to the app without device enrollment?", options: { A: "App configuration policy for managed apps (MAM target)", B: "App configuration policy for managed devices (MDM target)", C: "A device configuration profile with an email payload", D: "An app protection policy" }, correct: "A", explanation: "App configuration policies for 'managed apps' deliver settings via the Intune SDK — applicable to apps on devices with an app protection policy even without MDM enrollment. 'Managed devices' target requires full MDM enrollment. App protection policies control data movement, not app settings like accounts." },
    { question: "IT wants to silently pre-configure Outlook with the corporate email account on all MDM-enrolled iPhones so users don't need to enter their email address. Which policy?", options: { A: "App configuration policy for managed devices, with IntuneMAMUPN set to {{userprincipalname}}", B: "An app protection policy", C: "A device configuration profile > Email payload", D: "An app configuration policy for managed apps" }, correct: "A", explanation: "For MDM-enrolled devices, app configuration policies for managed devices push key-value configuration via the MDM channel. Setting IntuneMAMUPN (or Outlook-specific keys) to the {{userprincipalname}} token pre-populates the user's account automatically on enrollment." },
    { question: "During Autopilot deployment, Microsoft 365 Apps must install with specific products excluded (no Access, no Publisher) in the Monthly Enterprise Channel. Which tool generates the XML configuration used for this customization?", options: { A: "The Office Customization Tool (OCT) at config.office.com generates the configuration XML consumed by the Office Deployment Tool (ODT)", B: "The Intune Win32 Content Prep Tool (.intunewin)", C: "The Microsoft 365 Apps admin center Update Policy", D: "The DISM command-line tool" }, correct: "A", explanation: "OCT (config.office.com) is a web-based GUI that generates configuration XML specifying products, exclusions, languages, and update channels. This XML is passed to the ODT (setup.exe) during deployment. ODT does the actual installation; OCT designs the configuration." },
    { question: "You need to deploy a Play Store app to Android Enterprise fully managed devices in Intune. What is the required first step before assigning it?", options: { A: "Approve the app in Managed Google Play (play.google.com/work), then sync to Intune and assign", B: "Upload the .apk file directly to Intune as a LOB app", C: "Deploy it via a provisioning package", D: "Configure a compliance policy that requires the app to be installed" }, correct: "A", explanation: "Android Enterprise apps come from Managed Google Play. You approve them there (linking your Intune tenant to your Google account), they sync to Intune as 'Managed Google Play app' type, then you assign them. Direct .apk uploads are only for in-house LOB apps not in the Play Store." },
    { question: "IT wants to deploy 7-Zip to Windows endpoints. It's available in the Microsoft Store and should auto-update without IT packaging it. Which Intune app type uses WinGet under the hood?", options: { A: "Microsoft Store app (new)", B: "Microsoft Store app (legacy)", C: "Win32 app (.intunewin)", D: "Line-of-business app" }, correct: "A", explanation: "The 'Microsoft Store app (new)' type uses the WinGet package manager to install and automatically keep apps up to date — no .intunewin packaging required. It replaces the deprecated legacy Store for Business integration." },
    { question: "A company has a custom in-house iOS app (.ipa file, signed with Apple Developer Enterprise certificate) not in the App Store. How do you deploy it via Intune?", options: { A: "Upload it as a Line-of-business (LOB) iOS/iPadOS app in Intune (Apps > iOS/iPadOS > Add > Line-of-business app)", B: "Submit it to the Apple App Store, then deploy from there", C: "Use Apple Configurator to sideload it to each device", D: "Deploy it as a web clip linking to the .ipa download URL" }, correct: "A", explanation: "iOS LOB apps are deployed by uploading the signed .ipa file directly to Intune as a line-of-business app. Intune distributes it to MDM-enrolled devices without App Store submission. The app must be enterprise-signed with your Apple Developer Enterprise certificate." },
    { question: "The organization wants only Microsoft Outlook on iOS/Android to access Exchange Online, and only when Outlook has an Intune app protection policy. Which Conditional Access grant controls achieve this combination?", options: { A: "Require approved client app AND Require app protection policy", B: "Require compliant device", C: "Require hybrid Entra joined device", D: "Require multi-factor authentication" }, correct: "A", explanation: "App-based CA: 'Require approved client app' limits to Microsoft-approved clients (like Outlook); 'Require app protection policy' ensures an MAM policy covers the app. Together they enforce protected Outlook-only access without requiring full device enrollment." },
    { question: "An employee with a personal iPhone leaves the company. Their phone has Outlook with an app protection policy but the phone is NOT MDM-enrolled. Which action removes only corporate data without affecting personal data?", options: { A: "Retire the device in Intune — which performs a selective wipe, removing corporate app data and MAM enrollment", B: "Wipe the device — full factory reset", C: "Delete the user from Entra ID", D: "Remove the app protection policy assignment from the user" }, correct: "A", explanation: "For MAM-only enrolled devices, 'Retire' performs a selective wipe: it removes corporate app data, authentication tokens, and MAM registration while leaving personal content intact. 'Wipe' does a factory reset, which is inappropriate for a personal device." },
    { question: "Which two statements about the Enterprise App Catalog are accurate? (Choose two.)", options: { A: "It provides Microsoft-maintained, pre-packaged Win32 apps requiring no .intunewin preparation", B: "It is included in all base Intune licenses at no additional cost", C: "It is part of the Intune Suite add-on", D: "It only supports Microsoft first-party applications" }, correct: ["A","C"], explanation: "Enterprise App Catalog provides pre-packaged Win32 apps maintained by Microsoft — no Content Prep Tool needed (A). It is an Intune Suite add-on requiring an additional license (C). It is NOT free with base Intune (B is false), and it includes third-party enterprise apps, not only Microsoft apps (D is false)." },
    { question: "IT needs to enforce Office macro blocking in Word and Excel for all users across any device where they sign into Microsoft 365 Apps, without requiring device enrollment. Which tool manages this?", options: { A: "Office Cloud Policy in the Microsoft 365 Apps admin center (config.office.com/officeSettings/officePolicies)", B: "An Intune device configuration profile", C: "An Intune app configuration policy for managed devices", D: "A compliance policy that marks macro-enabled devices as noncompliant" }, correct: "A", explanation: "Office Cloud Policy (via the M365 Apps admin center) applies ADMX-backed Office settings to users at sign-in — on any managed or unmanaged device, with no device enrollment required. Intune device configuration profiles require MDM enrollment." },
    { question: "An Android app protection policy should block users from taking screenshots of corporate data in managed apps. Which Android-specific data protection setting controls this?", options: { A: "Screen capture and Google Assistant — set to Block", B: "Restrict cut, copy, and paste", C: "Require device PIN for access", D: "Prevent backup of org data to Google" }, correct: "A", explanation: "The 'Screen capture and Google Assistant' toggle in Android app protection policies blocks screenshot functionality and prevents Google Assistant from reading managed app content — an Android-specific control. iOS restricts screenshots separately via the OS for managed content." },
    { question: "Personal Android phones must access corporate Teams and Outlook with data protection, but IT cannot enroll or manage the devices. Which MAM scenario applies?", options: { A: "MAM without enrollment (MAM-WE) — app protection policies applied to unmanaged personal devices", B: "Android COPE enrollment", C: "Android fully managed enrollment", D: "Conditional Access requiring a compliant device" }, correct: "A", explanation: "MAM-WE applies Intune app protection policies to corporate apps on unmanaged personal Android/iOS devices via the Intune SDK. No device enrollment. Requiring a compliant device would force MDM enrollment, defeating BYOD-without-management intent." },
    { question: "Which two app types require no .intunewin packaging and can be deployed directly from Intune without the Win32 Content Prep Tool? (Choose two.)", options: { A: "Microsoft Store app (new) — WinGet-based", B: "Win32 app from a custom .exe installer", C: "Microsoft 365 Apps for Windows 10 and later", D: "Line-of-business app from an .exe file" }, correct: ["A","C"], explanation: "Microsoft Store app (new) uses WinGet — no packaging needed. Microsoft 365 Apps has its own native Intune app type with no .intunewin required. Win32 apps and LOB .exe files both require the Content Prep Tool to create an .intunewin package." },
  ],
  protect: [
    { question: "You must ensure Microsoft Defender Antivirus has cloud-delivered protection and real-time scanning enabled on all managed Windows devices. What do you create?", options: { A: "An endpoint security Antivirus policy", B: "A compliance policy", C: "An update ring", D: "An assignment filter" }, correct: "A", explanation: "The endpoint security Antivirus policy configures Microsoft Defender Antivirus settings such as cloud-delivered protection and real-time scanning. Compliance only reports state." },
    { question: "BitLocker must encrypt the OS drive silently on TPM-equipped Entra-joined devices, with the recovery key recoverable by IT. What do you deploy?", options: { A: "An endpoint security Disk encryption policy that enables BitLocker and escrows the key to Entra ID", B: "A compliance policy requiring encryption", C: "A configuration profile that emails the key to users", D: "Windows LAPS" }, correct: "A", explanation: "A disk encryption policy enables silent BitLocker (with a TPM) and backs the recovery key to Entra ID for admin recovery. Compliance policies only evaluate encryption state." },
    { question: "You want to roll out Attack Surface Reduction rules but first observe what they would block without affecting users. Which mode?", options: { A: "Audit", B: "Block", C: "Warn", D: "Disabled" }, correct: "A", explanation: "Audit logs what would have been blocked so you can assess impact before switching rules to Block. Warn lets users bypass; Disabled does nothing." },
    { question: "You need Microsoft's recommended, pre-configured set of hardened settings for Windows as a managed starting point. What do you deploy?", options: { A: "A security baseline", B: "A custom OMA-URI profile", C: "A compliance policy", D: "An update ring" }, correct: "A", explanation: "Security baselines are Microsoft-recommended preconfigured groups of settings you deploy and can customize. The others don't provide a curated baseline." },
    { question: "To get Intune devices reporting into Microsoft Defender for Endpoint, what must you do first, before onboarding?", options: { A: "Establish the Intune–Microsoft Defender for Endpoint connection (connector)", B: "Create a compliance policy", C: "Deploy a Win32 app of the sensor", D: "Enable Delivery Optimization" }, correct: "A", explanation: "You first turn on the Intune↔Defender for Endpoint connector, then deploy the EDR/onboarding policy so devices report to the Defender service. Manual sensor installs don't scale and aren't the managed path." },
    { question: "Which two settings are typically managed by an endpoint security Firewall policy in Intune? (Choose two.)", options: { A: "Enabling the Windows firewall per network profile (domain/private/public)", B: "Inbound/outbound firewall rules", C: "BitLocker recovery key escrow", D: "Office macro settings" }, correct: ["A", "B"], explanation: "Firewall policies control the Windows firewall state per profile and custom inbound/outbound rules. BitLocker escrow is a disk-encryption setting; macros are an Office policy." },
    { question: "You must defer Windows feature updates by 60 days and quality updates by 5 days, with active hours, for a pilot group. What do you create?", options: { A: "A Windows Update for Business update ring", B: "A feature update deployment", C: "A compliance policy", D: "A security baseline" }, correct: "A", explanation: "Update rings define feature/quality deferral, cadence, active hours, and deadlines. Feature update deployments pin a specific version but don't set quality deferral." },
    { question: "Managed iPhones must run iOS 17 or later within 7 days of an OS release. Which Intune capability enforces the update?", options: { A: "An iOS/iPadOS update policy", B: "An update ring", C: "A compliance policy only", D: "Delivery Optimization" }, correct: "A", explanation: "Intune update policies for iOS/iPadOS (and macOS) schedule and enforce OS updates on supervised devices. Update rings are Windows-only; compliance only reports the version." },
    { question: "You want managed Windows devices to share update content peer-to-peer on the LAN to reduce internet bandwidth during rollouts. What do you configure?", options: { A: "Delivery Optimization settings", B: "An update ring deadline", C: "A feature update deployment", D: "A compliance policy" }, correct: "A", explanation: "Delivery Optimization controls peer caching and bandwidth for update content. Update rings handle cadence/deferral, not peer distribution." },
    { question: "Leadership asks which devices have pending or failed Windows updates across the fleet. Where do you look?", options: { A: "Intune update reports (Windows update reports / monitoring)", B: "The Conditional Access sign-in logs", C: "The Autopilot deployment profile", D: "The app configuration policy" }, correct: "A", explanation: "Intune's Windows update reports and monitoring show update status, pending, and failures across devices. Sign-in logs cover access, not update state." },
    { question: "A device shows noncompliant for 'antivirus not enabled' even though you deployed an Antivirus policy. What is the conceptual gap to check first?", options: { A: "A configuration/endpoint-security policy sets AV, while the compliance policy evaluates it — confirm both are assigned and applied", B: "Compliance policies enable antivirus directly", C: "Antivirus can't be managed by Intune", D: "Only Conditional Access can enable antivirus" }, correct: "A", explanation: "Endpoint security policies configure the setting; compliance policies evaluate/report it (and feed Conditional Access). Both must be correctly assigned and applied to the device." },

    { question: "IT must configure Windows Firewall to block all unsolicited inbound connections except those in explicitly defined rules, using the Endpoint Security node in Intune. Which policy type?", options: { A: "Endpoint Security > Firewall > Microsoft Defender Firewall profile", B: "A device configuration profile with a firewall restriction template", C: "A compliance policy requiring the firewall to be enabled", D: "A security baseline with firewall settings" }, correct: "A", explanation: "Endpoint Security > Firewall creates dedicated firewall policies for Windows (Microsoft Defender Firewall profile) with granular inbound/outbound rule control. Compliance policies evaluate firewall state but don't configure rules. Security baselines include firewall settings but the dedicated firewall policy offers more targeted control." },
    { question: "Office applications spawning child processes (cmd.exe, PowerShell) is a known macro-based malware technique. Which Endpoint Security feature blocks this behavior on Windows endpoints?", options: { A: "An Attack Surface Reduction (ASR) rule: Block Office applications from creating child processes", B: "A device compliance policy requiring Defender to be enabled", C: "A Windows Defender Antivirus exclusion rule", D: "A firewall outbound block rule for Office executables" }, correct: "A", explanation: "ASR rules are specific behavioral controls in Microsoft Defender. 'Block Office applications from creating child processes' prevents Word, Excel, and PowerPoint from launching cmd.exe, PowerShell, or other processes — a critical defense against macro-based attacks." },
    { question: "Before deploying an ASR rule to production, the security team wants to monitor which devices and processes would be affected without blocking anything. Which ASR mode should be configured first?", options: { A: "Audit mode — events are logged but nothing is blocked", B: "Warn mode — users see a warning prompt but can bypass", C: "Block mode — immediately enforced with no bypass", D: "Disabled — no logging or enforcement" }, correct: "A", explanation: "Audit mode logs ASR rule triggers to Windows event log and Microsoft Defender for Endpoint (if connected) without blocking the action. This lets you assess potential business impact before switching to Block mode. Warn mode notifies users; Block enforces immediately with no visibility phase." },
    { question: "IT wants to apply a comprehensive set of Microsoft-recommended security configurations to all Windows 11 endpoints in one policy, based on the Microsoft Security Benchmark. What does Intune provide?", options: { A: "Security baselines (e.g., Windows 10/11 MDM Security Baseline)", B: "A custom Settings Catalog profile", C: "Endpoint Privilege Management", D: "Microsoft Defender for Endpoint Advanced Hunting" }, correct: "A", explanation: "Security baselines in Intune are pre-configured policy sets aligned with the Microsoft Security Benchmark, covering BitLocker, Credential Guard, firewall rules, browser hardening, and hundreds of other settings — all with Microsoft-recommended defaults applied in a single policy." },
    { question: "A dedicated security baseline tuned specifically for devices onboarded to Microsoft Defender for Endpoint exists in Intune. What is it called?", options: { A: "Microsoft Defender for Endpoint security baseline", B: "Microsoft Edge security baseline", C: "Windows 365 security baseline", D: "Microsoft 365 Apps security baseline" }, correct: "A", explanation: "Intune includes a dedicated MDE security baseline with settings specifically recommended for Defender for Endpoint-onboarded devices (cloud protection level, sample submission, attack surface rules). It's maintained separately from the MDM Security Baseline." },
    { question: "Before deploying an Intune endpoint security policy to onboard Windows devices into Microsoft Defender for Endpoint, which prerequisite connection must first be established?", options: { A: "A service-to-service connection between the Intune tenant and MDE tenant (Endpoint security > Microsoft Defender for Endpoint > Connect)", B: "A Microsoft Sentinel data connector for Intune", C: "An Entra ID App Registration for the MDE API", D: "A Microsoft 365 Defender data export rule" }, correct: "A", explanation: "The Intune-MDE connection (in Endpoint security > Microsoft Defender for Endpoint) is required before deploying onboarding policies, sharing compliance signals, or using MDE data in Intune. This tenant-to-tenant authorization enables all co-management scenarios." },
    { question: "After enabling the Intune-MDE connector, how do you onboard Windows 10/11 devices into Defender for Endpoint via Intune policy?", options: { A: "Create an Endpoint Security > Endpoint detection and response (EDR) policy with the onboarding configuration set to Intune", B: "Deploy a PowerShell script containing the MDE onboarding blob to each device", C: "Create a compliance policy that marks unonboarded devices as noncompliant", D: "Assign the MDE sensor as a Win32 .intunewin app deployment" }, correct: "A", explanation: "The EDR policy (Endpoint security > Endpoint detection and response) automates MDE onboarding by pushing the onboarding configuration to targeted devices via Intune. Compliance policies can flag the state but don't perform onboarding. The EDR policy is the official managed onboarding method." },
    { question: "A branch office with 50 Windows devices should download Windows updates from each other on the local network to save internet bandwidth, falling back to Microsoft CDN only if the peer cache is empty. Which Delivery Optimization mode?", options: { A: "LAN (mode 1) — HTTP with LAN peering", B: "HTTP only (mode 0) — no peering", C: "Group (mode 2) — peers across subnets via a Group ID", D: "Simple (mode 99) — bypass Delivery Optimization" }, correct: "A", explanation: "DO mode 1 (LAN) enables peer-to-peer content sharing within the same subnet, falling back to HTTP CDN when no peer has the content. Mode 0 is HTTP-only with no peering. Mode 2 peers across subnets using a custom Group ID. Mode 99 bypasses DO entirely." },
    { question: "Remote employees work from home with no shared LAN. IT wants Delivery Optimization peers to be other company devices over the internet — not random internet peers. Which DO configuration achieves this?", options: { A: "Group mode (mode 2) with a custom DO Group ID (a company-specific GUID)", B: "LAN mode (mode 1)", C: "Internet mode (mode 3 — public peer-to-peer)", D: "HTTP only (mode 0)" }, correct: "A", explanation: "DO Group mode (2) forms a private peer group using a custom GUID as the Group ID. Devices with the same Group ID peer with each other over the internet, regardless of subnet — perfect for remote workers. Internet mode (3) would peer with strangers; LAN mode requires shared subnet." },
    { question: "Supervised iPhones must be forced to install security updates within 48 hours of release. Where is this update enforcement configured in Intune?", options: { A: "Devices > iOS/iPadOS > Update policies for iOS/iPadOS", B: "A compliance policy requiring a minimum iOS version", C: "An app protection policy with an OS version condition", D: "An iOS device configuration profile with a software update restriction payload" }, correct: "A", explanation: "Update policies for iOS/iPadOS (in the Intune iOS section) push OS updates to supervised Apple devices and enforce installation deadlines. Compliance policies detect non-compliance but don't push updates. Configuration profiles can defer updates, not mandate their installation." },
    { question: "Company-owned Macs should delay major macOS feature updates by 60 days to allow IT to validate compatibility before rollout. Where is this deferral configured?", options: { A: "Update policies for macOS (software update deferral) in Intune — Devices > macOS > Update policies", B: "A macOS compliance policy with a maximum OS version", C: "A macOS device configuration profile with MDM restriction payload", D: "A security baseline for macOS" }, correct: "A", explanation: "macOS update policies in Intune support deferral of major, minor, and non-security updates by up to 90 days for supervised Macs. Compliance policies evaluate OS version; they don't control update timing. The deferral must be configured in the update policy, not a restriction profile." },
    { question: "Zebra Android Enterprise devices support OEM-managed firmware updates. IT wants to control when firmware updates install without using standard Android Enterprise policy limits. Which approach does Intune support?", options: { A: "Android FOTA partner integration — connecting the OEM's update management service to Intune", B: "A Managed Google Play mandatory update policy", C: "A Managed Google Play store update restriction", D: "A device configuration profile > Android update restriction" }, correct: "A", explanation: "FOTA (Firmware Over The Air) partner integrations allow supported OEMs (Zebra, Samsung Knox, etc.) to connect their update management platform to Intune. IT controls firmware updates through Intune using the OEM's service — beyond what standard Android Enterprise policies support." },
    { question: "IT wants Windows quality and feature updates to deploy automatically to devices using Microsoft-defined deployment rings (Test, First, Fast, Broad) without manually managing update ring policies. Which service provides this?", options: { A: "Windows Autopatch", B: "Windows Update for Business (Intune update rings)", C: "Microsoft Intune Windows update policies", D: "Microsoft Endpoint Configuration Manager software update groups" }, correct: "A", explanation: "Windows Autopatch fully automates Windows, Microsoft 365 Apps, Edge, and Teams updates using Microsoft-defined rings and deployment intelligence. IT registers devices; Microsoft manages the orchestration. Update rings (WUfB) still require IT to configure and maintain ring policies." },
    { question: "After deploying a Windows quality update ring to 500 devices, how do you see per-device installation status (installed, pending, failed) in Intune?", options: { A: "Reports > Windows updates > Update rings report > select the ring and view per-update device status", B: "Microsoft 365 Admin Center > Reports > Device health", C: "Endpoint analytics dashboard > Device performance", D: "A KQL device query against the InstalledUpdates table" }, correct: "A", explanation: "Intune's Windows update reports (Reports > Windows updates) provide per-ring and per-device update status showing Installed, In progress, Not yet attempted, and Error counts for each quality or feature update deployment. This is the correct monitoring location in Intune." },
    { question: "Which three policy types can be created directly within the Endpoint Security node in Intune? (Choose three.)", options: { A: "Antivirus", B: "App protection policy", C: "Disk encryption", D: "Attack surface reduction", E: "Device compliance policy" }, correct: ["A","C","D"], explanation: "Endpoint Security contains: Antivirus, Disk encryption, Firewall, Endpoint detection and response, Attack surface reduction, and Account protection. App protection policies are under Apps > App protection policies. Compliance policies are under Devices > Compliance." },
    { question: "A BitLocker-protected Entra-joined Windows laptop is locked and the user forgot their PIN. Where does the help desk retrieve the 48-digit recovery key for an Intune-managed, Entra-joined device?", options: { A: "Microsoft Entra admin center > Devices > [device name] > Recovery keys", B: "On-premises Active Directory (via Active Directory Users and Computers)", C: "Intune admin center > Devices > [device] > Hardware", D: "Microsoft Defender for Endpoint > Device inventory" }, correct: "A", explanation: "For Entra-joined (cloud-only) devices with BitLocker backup configured in Intune, recovery keys are escrowed to Microsoft Entra ID. Authorized admins retrieve them in Entra admin center under the device's Recovery keys tab. On-prem AD is for hybrid-joined domain devices only." },
  ]
};

// ── SOUND ENGINE ─────────────────────────────────────────────────────
const SFX = (() => {
  let _ctx = null;
  const gc = () => { if (!_ctx) { try { _ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){} } return _ctx; };
  const tone = (freq, type, dur, vol, detune=0, delay=0) => {
    const c = gc(); if (!c) return;
    const t = c.currentTime + delay;
    const o = c.createOscillator(), g = c.createGain();
    o.connect(g); g.connect(c.destination);
    o.type=type; o.frequency.value=freq; o.detune.value=detune;
    g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(vol,t+.005);
    g.gain.exponentialRampToValueAtTime(.001,t+dur);
    o.start(t); o.stop(t+dur+.01);
  };
  const noise = (dur,vol,delay=0) => {
    const c = gc(); if (!c) return;
    const buf = c.createBuffer(1,c.sampleRate*dur,c.sampleRate);
    const d = buf.getChannelData(0);
    for (let i=0;i<d.length;i++) d[i]=(Math.random()*2-1);
    const s=c.createBufferSource(), g=c.createGain(), f=c.createBiquadFilter();
    f.type='bandpass'; f.frequency.value=200; f.Q.value=0.5;
    s.buffer=buf; s.connect(f); f.connect(g); g.connect(c.destination);
    const t=c.currentTime+delay;
    g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(.001,t+dur);
    s.start(t); s.stop(t+dur);
  };
  return {
    correct: () => { tone(523.25,'sine',.12,.18); tone(659.25,'sine',.14,.15,0,.08); tone(783.99,'sine',.22,.12,0,.16); tone(1046.5,'sine',.18,.08,0,.24); },
    wrong: () => { tone(180,'sawtooth',.28,.12); tone(160,'square',.22,.08,-30); noise(.15,.06); },
    milestone: () => { [523,587,659,698,784,880,1047].forEach((f,i)=>tone(f,'sine',.5,.16,0,i*.055)); },
    tab: () => { tone(580,'sine',.08,.055); },
    flip: () => { tone(700,'sine',.09,.04); tone(900,'sine',.07,.03,0,.05); },
    examStart: () => { [440,554,659].forEach((f,i)=>tone(f,'sine',.4,.1,0,i*.15)); },
    examSubmit: () => { [659,784,880,1047].forEach((f,i)=>tone(f,'sine',.6,.12,0,i*.08)); },
  };
})();

function ParticleCanvas() {
  const ref = useRef(null);
  const pts = useRef([]); const flashes = useRef([]); const raf = useRef(0);
  useEffect(() => {
    const canvas = ref.current; if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const resize = () => { canvas.width = window.innerWidth * (window.devicePixelRatio||1); canvas.height = window.innerHeight * (window.devicePixelRatio||1); ctx.scale(window.devicePixelRatio||1, window.devicePixelRatio||1); };
    resize(); window.addEventListener('resize', resize);
    const CORRECT_COLORS = ['#34D399','#6EE7B7','#FFB200','#FF2D78','#B584FF','#fff'];
    const spawnCorrect = (x, y) => {
      const cx = x||window.innerWidth*.5, cy = y||window.innerHeight*.45;
      for (let i=0;i<32;i++) {
        const a=(Math.PI*2*i/32)+(Math.random()-.5)*.8, spd=5+Math.random()*12;
        pts.current.push({ x:cx,y:cy, vx:Math.cos(a)*spd, vy:Math.sin(a)*spd-4,
          life:1, decay:.018+Math.random()*.016, sz:3+Math.random()*7,
          color:CORRECT_COLORS[Math.floor(Math.random()*CORRECT_COLORS.length)],
          type:i%4===0?'star':i%4===1?'ring':'circle', grav:.28, spin:(Math.random()-.5)*.4 });
      }
      flashes.current.push({ type:'ring', x:cx, y:cy, r:10, maxR:160, life:1, color:'#34D399', lw:3 });
      flashes.current.push({ type:'ring', x:cx, y:cy, r:5, maxR:90, life:1, color:'rgba(255,255,255,0.7)', lw:1.5 });
      window.__gameMood = { type:'correct', t:Date.now() };
    };
    const spawnWrong = (x, y) => {
      flashes.current.push({ type:'flash', color:'rgba(248,60,60,', life:1, decay:.07 });
      const cx=x||window.innerWidth*.5, cy=y||window.innerHeight*.45;
      for (let i=0;i<20;i++) {
        const a=Math.PI*2*i/20, spd=2+Math.random()*7;
        pts.current.push({ x:cx,y:cy, vx:Math.cos(a)*spd, vy:Math.sin(a)*spd,
          life:1, decay:.04+Math.random()*.03, sz:2+Math.random()*5,
          color:'#F87171', type:'shard', grav:.22, spin:0 });
      }
      window.__gameMood = { type:'wrong', t:Date.now() };
    };
    const spawnMilestone = () => {
      const cx=window.innerWidth*.5, cy=window.innerHeight*.4;
      const COLORS=['#FF2D78','#FFB200','#B584FF','#34D399','#fff','#FF6B5A','#60A5FA'];
      for (let i=0;i<70;i++) {
        const a=Math.random()*Math.PI*2, spd=4+Math.random()*18;

      window.__gameMood = { type:'milestone', t:Date.now() };
    };
    const handler = e => {
      const {type,x,y}=e.detail;
      if(type==='correct') spawnCorrect(x,y);
      else if(type==='wrong') spawnWrong(x,y);
      else if(type==='milestone') spawnMilestone();
    };
    window.addEventListener('game-event', handler);

function Sparkline({ values, color = "#FF2D78", w = 320, h = 54 }) {
  const id = useRef("s" + Math.random().toString(36).slice(2, 7)).current;
  if (!values || values.length < 2) return null;
  const min = Math.min(...values), max = Math.max(...values), span = (max - min) || 1;
  const pts = values.map((v, i) => [(i / (values.length - 1)) * w, h - ((v - min) / span) * (h - 8) - 4]);
  const line = pts.map(p => p[0].toFixed(1) + "," + p[1].toFixed(1)).join(" ");
  const area = "0," + h + " " + line + " " + w + "," + h;
  return (
    React.createElement('svg', { width: "100%", height: h, viewBox: `0 0 ${w} ${h}`, preserveAspectRatio: "none", style: { display: "block" },}
      , React.createElement('defs', null
        , React.createElement('linearGradient', { id: id, x1: "0", y1: "0", x2: "0", y2: "1",}
          , React.createElement('stop', { offset: "0", stopColor: color, stopOpacity: 0.32,} )
          , React.createElement('stop', { offset: "1", stopColor: color, stopOpacity: 0,} )
        )
      )
      , React.createElement('polygon', { points: area, fill: `url(#${id})`,} )
      , React.createElement('polyline', { points: line, fill: "none", stroke: color, strokeWidth: 2.5, strokeLinecap: "round", strokeLinejoin: "round", style: { filter: `drop-shadow(0 0 5px ${color}66)` },} )
    )
  );
}
